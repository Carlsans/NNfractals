[rendering]
default_width  = 512
default_height = 512
max_iter       = 192     # was 128 — deeper iteration depth, richer saved fractal detail
bailout        = 4.0
colormap       = "turbo"    # turbo = cool-blue for low escape times; preferred by CLIP; earth | neon | inferno | viridis | plasma | magma
view_x_min     = -2.0
view_x_max     =  2.0
view_y_min     = -2.0
view_y_max     =  2.0

# Formula = sparse set of weighted basis terms, evolved directly by the GA.
# (Transformer + backprop removed — they fought the GA and drove elites to noise.)
[optimization]
population_size          = 130    # CYCLE10: retry — cycle8 raised this alone and it saturated the fixed-size novelty archive (cycle9 reverted); this time archive_size is scaled proportionally too, see below
formula_system           = "dag"   # A/B experiment: instance 2 runs the expression-DAG system
ood_weight               = 0.25   # reward fractals unlike anything already saved (drives unusual)
elitism_count            = 6
mutation_rate            = 0.20   # per-coefficient perturbation probability
mutation_scale           = 0.08   # coefficient perturbation magnitude
eval_width               = 64     # 64×64: fast PNG compression eval (4096 pixels per genome)
eval_height              = 64
eval_max_iter            = 128    # deeper iteration → richer fitness signal
restart_after_gens       = 20     # ITER1: faster reseed from high-pref archive (taste enters at seeding); was 30
novelty_weight           = 0.60   # ITER1: ↑ from 0.45 — best_ever was flat + 62% low_diversity churn; absorb freed dead-predictor weight into real exploration
novelty_k                = 5
archive_size             = 195    # CYCLE10: scaled 150→195 proportionally with population_size (100→130) so the novelty window doesn't saturate faster relative to the larger per-gen candidate pool
self_replication_weight  = 0.35   # favor Mandelbrot-like zoom self-replication in seed ranking
fractal_recursion_weight = 0.35   # favor embedded miniature copies of the whole set (baby-Mandelbrots)
recursion_pred_weight    = 0.0    # ITER1: DISABLED — pred_recursion is a dead constant (0.682) for DAG genomes (model trained on old basis repr); was inert offset
formula_diversity_weight = 0.60   # CYCLE4: ↑ from 0.45 — mean_fdiv drifted down across cycles 3-4 (0.41→0.39→0.386), formula families slowly homogenizing under pref-elite breeding
clip_pred_weight         = 0.0    # ITER1: DISABLED — pred_clip is a dead constant (0.5197) for DAG genomes; CLIP collapsed on fractals anyway
pref_weight              = 0.4    # blend trained human-preference (pref_score) into saved fitness + seed ranking
seed_pref_weight         = 3.0    # STRONG pref weight when picking the individuals that START the group (warm-start/restart seeds)
musiq_weight             = 0.25   # positive reward for high MUSIQ technical quality (norm (musiq-30)/50), below pref so pref stays dominant
pref_elite_count         = 4      # ITER3: re-inject top-4 measured-pref recent saves into breeding each gen — real taste steers search
archive_random_ratio     = 0.30   # NEW ARCHITECTURE: 30% of each (re)seeded pool is pure-random; rest bred from archive seeds (never plain-cloned)
duplicate_penalty_weight = 0.50   # NEW ARCHITECTURE: quadratic penalty on formula families that dominate the saved archive (FormulaUsageTracker)

[output]
save_dir                 = "./fractals_2"     # NEW ARCHITECTURE: fresh empty pool, replaces ./fractals_dag
population_dir           = "./populations_2"
min_entropy_prefilter    = 0.38  # widened: dedup cleans near-dups every 2h
max_entropy_prefilter    = 0.70  # widened: dedup cleans near-dups every 2h
min_clip_score           = 0.522 # OR gate: pass if CLIP ≥ this (above mean) — privileges CLIP winners
min_laion_score          = 5.30  # OR gate: pass if LAION ≥ this — privileges LAION winners
min_beauty               = 0.35  # fallback beauty when aesthetic scorer unavailable
min_pref                 = 0.55  # ITER4: raised 0.50→0.55 (iter3 pref median 0.70, p10 0.53 — headroom to push taste; pairs with breeding-only pref-elites)
min_musiq                = 58.0  # CYCLE6: raised 57→58 — p10 musiq was 59.4, medians stable after last raise (64.7 held)
min_save_distance        = 0.05  # relaxed from 0.08 — dedup handles remaining near-dups

[dedup]
similarity_threshold     = 0.97  # multi-scale DCT geometric mean (16/32/64px grayscale); run scripts/dedup.py --run
interval_hours           = 2.0   # evolution auto-cleans near-duplicates every N hours (0 = disable)
