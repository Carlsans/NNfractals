[rendering]
default_width  = 800
default_height = 600
max_iter       = 128
bailout        = 4.0
colormap       = "turbo"    # turbo = cool-blue for low escape times; preferred by CLIP; earth | neon | inferno | viridis | plasma | magma
view_x_min     = -2.0
view_x_max     =  2.0
view_y_min     = -2.0
view_y_max     =  2.0

[network]
d_model         = 8     # transformer hidden/embedding width (complex neurons)
ff_mult         = 2     # feed-forward expansion: d_ff = d_model * ff_mult = 16
activation_pool = ["sin", "cos", "tanh", "square", "identity", "sigmoid",
                   "gauss", "atan", "fract", "swish", "sinc", "tent",
                   "conj", "abs_re", "abs_im", "abs_both", "abs"]

[optimization]
population_size          = 20
elitism_count            = 2
mutation_rate            = 0.15
mutation_scale           = 0.05
activation_mutation_prob = 0.08
backprop_steps           = 2
learning_rate            = 0.010
eval_width               = 48
eval_height              = 48
eval_max_iter            = 48
backprop_max_iter        = 6      # short unroll keeps autodiff graph shallow
eval_clamp               = 20.0
restart_after_gens       = 35     # increased from 25: more time to converge per population
novelty_weight           = 0.3    # reduced from 0.5: more emphasis on beauty over novelty
novelty_k                = 5
archive_size             = 150

[output]
save_dir                 = "./fractals"
population_dir           = "./populations"
min_entropy_prefilter    = 0.20   # Stage 1: fast entropy gate (low-res escape times)
min_clip_score           = 0.50   # Stage 2: CLIP aesthetic threshold (pre-trained model)
min_beauty               = 0.42   # Fallback if CLIP sidecar unavailable
min_save_distance        = 0.10   # min L2 distance between saved-image descriptors
