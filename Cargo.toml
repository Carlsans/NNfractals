[package]
name = "nnfractals"
version = "0.1.0"
edition = "2024"

[features]
default = ["wgpu-backend"]
wgpu-backend = ["burn/wgpu"]
ndarray-backend = ["burn/ndarray"]

[dependencies]
burn       = { version = "0.21", features = ["autodiff"] }
image      = "0.25"
colorous   = "1"
clap       = { version = "4", features = ["derive"] }
serde      = { version = "1", features = ["derive"] }
serde_json = "1"
toml       = "0.8"
rand       = "0.9"
rayon      = "1"
crossterm  = "0.29"
anyhow     = "1"
ctrlc      = "3"
