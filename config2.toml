[rendering]
default_width  = 512
default_height = 512
max_iter       = 192     # was 128 — deeper iteration depth, richer saved fractal detail
bailout        = 4.0
colormap       = "turbo"    # turbo = cool-blue for low escape times; preferred by CLIP; earth | neon | inferno | viridis | plasma | magma
view_x_min     = -2.0
view_x_max     =  2.0
view_y_min     = -2.0
view_y_max     =  2.0

# Formula = sparse set of weighted basis terms, evolved directly by the GA.
# (Transformer + backprop removed — they fought the GA and drove elites to noise.)
[optimization]
population_size          = 40
elitism_count            = 6
mutation_rate            = 0.20   # per-coefficient perturbation probability
mutation_scale           = 0.08   # coefficient perturbation magnitude
eval_width               = 64     # 64×64: fast PNG compression eval (4096 pixels per genome)
eval_height              = 64
eval_max_iter            = 128    # deeper iteration → richer fitness signal
restart_after_gens       = 30     # faster epoch cycle, reload archive seeds more often
novelty_weight           = 0.45   # push hard toward unexplored visual regions
novelty_k                = 5
archive_size             = 150
self_replication_weight  = 0.35   # favor Mandelbrot-like zoom self-replication in seed ranking
fractal_recursion_weight = 0.35   # favor embedded miniature copies of the whole set (baby-Mandelbrots)
recursion_pred_weight    = 0.80   # MAJOR per-gen criterion: formula-only predicted recursion (recursion_model.json)
formula_diversity_weight = 0.30   # per-gen bonus for structurally distinct formula families (k-NN in basis space)
clip_pred_weight         = 0.50   # per-gen bonus for formula-predicted CLIP aesthetic (linear model on archive)

[output]
save_dir                 = "./fractals"
population_dir           = "./populations2"
min_entropy_prefilter    = 0.38  # widened: dedup cleans near-dups every 2h
max_entropy_prefilter    = 0.70  # widened: dedup cleans near-dups every 2h
min_clip_score           = 0.522 # OR gate: pass if CLIP ≥ this (above mean) — privileges CLIP winners
min_laion_score          = 5.30  # OR gate: pass if LAION ≥ this — privileges LAION winners
min_beauty               = 0.35  # fallback beauty when aesthetic scorer unavailable
min_save_distance        = 0.05  # relaxed from 0.08 — dedup handles remaining near-dups

[dedup]
similarity_threshold     = 0.97  # multi-scale DCT geometric mean (16/32/64px grayscale); run scripts/dedup.py --run
interval_hours           = 2.0   # evolution auto-cleans near-duplicates every N hours (0 = disable)
